name             = "testsockprochs"
main             = "index.js"
compatibility_date = "2024-09-01"

# ── Biến môi trường (override trong CF Dashboard → Settings → Variables) ──
[vars]
SECRET_KEY             = "abc"
VERIFY_TOKEN           = "abc"
JWT_GENERATOR_USERNAME = "abc"
JWT_GENERATOR_PASSWORD = "abc"
TUNNEL_TOKEN = "abc"
TAG_A = 'side-a'
TAG_B = 'side-b'

# ── Durable Objects ───────────────────────────────────────────────────────
# Mỗi hostname tunnel sẽ có một TunnelHost instance riêng biệt
[[durable_objects.bindings]]
name = "TUNNEL"
class_name = "TunnelDO"

[[migrations]]
tag                = "v1"
new_sqlite_classes = ["TunnelDO"]
